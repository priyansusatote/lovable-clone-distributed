# k8s/infra/core-network-policies.yaml

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-only
  namespace: lovable-core
spec:
  podSelector: {} # Applies to all pods in lovable-core
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lovable-core

---
# 2. NEW POLICY: Allow Previews to talk to MinIO (for file storage)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-previews-to-minio
  namespace: lovable-core
spec:
  # Target ONLY the MinIO pod (adjust matchLabels if your MinIO pod label is different)
  podSelector: 
    matchLabels:
      app: minio # or statefulset.kubernetes.io/pod-name: minio-0
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic FROM the lovable-previews namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lovable-previews
      # ONLY on port 9000
      ports:
        - protocol: TCP
          port: 9000

---
# 3. NEW POLICY: Allow NGINX Ingress to talk to API Gateway and Proxy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-ingress
  namespace: lovable-core
spec:
  # This applies to the services Nginx needs to reach
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["api-gateway", "lovable-me-proxy", "lovable-frontend"] # Add any other services that need to be exposed via Ingress
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic FROM the ingress-nginx namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx

---

#new policy for tls Dns
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-core
  namespace: lovable-core
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53


---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internet-egress
  namespace: lovable-core
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8
              - 192.168.0.0/16
              - 172.16.0.0/12

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-core-internal-egress
  namespace: lovable-core
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lovable-core

---
#cert-manager-allow
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cert-manager
  namespace: lovable-core
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cert-manager

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-k8s-api
  namespace: lovable-core
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-proxy-to-previews
  namespace: lovable-core
spec:
  podSelector:
    matchLabels:
      app: lovable-me-proxy
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 5173
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: lovable-previews