name: Deploy Config Service

on:
  push:
    branches:
      - main
    paths:
      - 'config-service/**'   # 🔹 Trigger only when config-service code changes (microservice-based CI/CD)

env:
  SERVICE_NAME: config-service
  IMAGE_NAME: priyansusatote/lovable-config-service  # 🔹 DockerHub image name

permissions:
  id-token: write   # 🔹 Required for OIDC (GitHub → GCP authentication)
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy to GKE
    runs-on: ubuntu-latest   # 🔹 GitHub runner (Linux VM)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # 🔹 Pull latest code from repo

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # 🔹 Speeds up builds


      - name: Build and Push Docker Image with Jib
        working-directory: ./${{ env.SERVICE_NAME }}
        run: |
          ./mvnw compile jib:build \
            -Djib.to.image=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -Djib.to.tags=latest \
            -Djib.to.auth.username=${{ secrets.DOCKERHUB_USERNAME }} \
            -Djib.to.auth.password=${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          # 🔹 OIDC authentication (no JSON key, secure)

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER }}
          location: ${{ secrets.GCP_ZONE }}
          # 🔹 Connects kubectl to your GKE cluster

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/${{ env.SERVICE_NAME }} \
          ${{ env.SERVICE_NAME }}=${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n lovable-core
          # 🔹 Rolling update (zero downtime deployment)

          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n lovable-core
          # 🔹 Wait until deployment is successful